[build]
  builder = "NIXPACKS"
  buildCommand = "npm install && npm run build"

[deploy]
  startCommand = "npm start"
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3

[[services]]
  name = "xeno-crm-channel-service"

[healthcheck]
  path = "/health"
  intervalSeconds = 30
  timeoutSeconds = 5
